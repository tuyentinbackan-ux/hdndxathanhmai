<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Màn Hình Kết Quả Trung Tâm - HĐND Xã Thanh Mai</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col justify-between">

    <div class="container mx-auto px-6 py-6 max-w-6xl flex-grow flex flex-col justify-between">
        <!-- Tiêu đề lớn hiển thị trên Máy Chiếu -->
        <header class="text-center border-b border-slate-700 pb-4 mb-6">
            <h1 class="text-3xl font-extrabold text-red-500 uppercase tracking-widest">HỘI ĐỒNG NHÂN DÂN XÃ THANH MAI</h1>
            <p class="text-xl font-bold text-sky-400 mt-2">KẾT QUẢ BIỂU QUYẾT KỲ HỌP ĐIỆN TỬ THỜI GIAN THỰC</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-5 gap-8 flex-grow items-center">
            <!-- Bảng số liệu chi tiết (Chiếm 2 phần) -->
            <div class="bg-slate-800 p-6 rounded-2xl shadow-2xl border border-slate-700 lg:col-span-2">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-bold text-slate-300">BẢNG THỐNG KÊ CHI TIẾT</h2>
                    <span class="bg-blue-900/50 text-blue-300 border border-blue-700 text-xs px-3 py-1 rounded-full font-bold">Mốc: 12 Đại biểu</span>
                </div>
                
                <div class="space-y-4">
                    <div class="bg-emerald-950/40 border border-emerald-800/60 p-4 rounded-xl flex justify-between items-center">
                        <span class="text-emerald-400 font-bold text-lg">👍 TÁN THÀNH</span>
                        <div class="text-right">
                            <span id="count-0" class="text-2xl font-black text-white mr-2">0</span>
                            <span id="percent-0" class="text-sm font-bold text-emerald-500">0%</span>
                        </div>
                    </div>
                    
                    <div class="bg-rose-950/40 border border-rose-800/60 p-4 rounded-xl flex justify-between items-center">
                        <span class="text-rose-400 font-bold text-lg">👎 KHÔNG TÁN THÀNH</span>
                        <div class="text-right">
                            <span id="count-1" class="text-2xl font-black text-white mr-2">0</span>
                            <span id="percent-1" class="text-sm font-bold text-rose-500">0%</span>
                        </div>
                    </div>

                    <div class="bg-amber-950/40 border border-amber-800/60 p-4 rounded-xl flex justify-between items-center">
                        <span class="text-amber-400 font-bold text-lg">🤔 Ý KIẾN KHÁC</span>
                        <div class="text-right">
                            <span id="count-2" class="text-2xl font-black text-white mr-2">0</span>
                            <span id="percent-2" class="text-sm font-bold text-amber-500">0%</span>
                        </div>
                    </div>
                </div>

                <div class="mt-6 pt-4 border-t border-slate-700 flex justify-between text-xs text-slate-400 font-mono">
                    <span>Trạng thái kết nối:</span>
                    <span id="status">🟢 ĐANG ĐỒNG BỘ ĐÁM MÂY</span>
                </div>
            </div>

            <!-- Biểu đồ cột cực lớn cho máy chiếu (Chiếm 3 phần) -->
            <div class="bg-slate-800 p-6 rounded-2xl shadow-2xl border border-slate-700 lg:col-span-3 h-full min-h-[350px] flex items-center">
                <div class="w-full h-80">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Thanh công cụ reset phiếu của Ban tổ chức dưới chân máy chủ -->
    <footer class="bg-slate-950 py-3 text-center w-full border-t border-slate-800">
        <button onclick="resetServer()" class="bg-red-700 hover:bg-red-800 text-white font-bold px-5 py-1.5 rounded-lg text-xs shadow-lg transition">
            🔄 KHỞI TẠO PHIÊN HỌP MỚI (ĐƯA TẤT CẢ SỐ PHIẾU VỀ 0)
        </button>
    </footer>

    <script>
        const firebaseConfig = { databaseURL: "https://hdnd-thanhmai-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let voteData = [0, 0, 0];
        let mainChart;

        // Máy chủ lắng nghe liên tục biến động từ 12 máy con cầm tay gửi về
        function initSync() {
            db.ref('session_hdnd').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.votes) {
                    voteData = data.votes;
                } else {
                    voteData = [0, 0, 0];
                }
                updateUI();
            });
        }

        function initChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            mainChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Tán thành', 'Không tán thành', 'Ý kiến khác'],
                    datasets: [{ data: voteData, backgroundColor: ['#10b981', '#f43f5e', '#f59e0b'], borderRadius: 8 }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 14, weight: 'bold' } } },
                        y: { min: 0, max: 12, ticks: { stepSize: 1, color: '#94a3b8', precision: 0 } }
                    }
                }
            });
            initSync();
        }

        function updateUI() {
            const total = voteData.reduce((a, b) => a + b, 0);
            voteData.forEach((votes, index) => {
                const pct = total > 0 ? ((votes / total) * 100).toFixed(1) : 0;
                document.getElementById(`count-${index}`).innerText = votes;
                document.getElementById(`percent-${index}`).innerText = `${pct}%`;
            });
            if (mainChart) {
                mainChart.data.datasets[0].data = voteData;
                mainChart.update();
            }
        }

        function resetServer() {
            if (confirm("Đồng chí có chắc chắn xóa sạch dữ liệu để bắt đầu nội dung biểu quyết mới?")) {
                db.ref('session_hdnd').set({ votes: [0, 0, 0], votedList: {} });
            }
        }

        window.onload = initChart;
    </script>
</body>
</html>
